<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Attendance | Attendix</title>
    
    <script>
        (function() {
            const token = localStorage.getItem("userToken");
            const role = localStorage.getItem("userRole");

            if (!token) { window.location.replace('login.html'); } 
            else if (role !== 'doctor') {
                window.location.replace('student_dashboard.html'); 
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #2563eb;
            --brand-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --transition: all 0.3s ease;
            --success-color: #059669;
            --success-bg: #ecfdf5;
            --error-color: #dc2626;
            --error-bg: #fef2f2;
        }

        body { display: flex; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }

        /* ================= Sidebar ================= */
        .sidebar { width: 280px; background-color: var(--surface); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; z-index: 10; box-shadow: var(--shadow-sm); }
        .logo-area { padding: 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-light); text-decoration: none; }
        .logo-area .icon-box { background: var(--brand-color); color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .logo-area span { font-size: 22px; font-weight: 800; color: var(--text-main); }
        
        .prof-profile { padding: 24px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-light); }
        .prof-profile .avatar { width: 50px; height: 50px; background: var(--brand-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; }
        .prof-info .name { font-weight: 700; color: var(--text-main); font-size: 1.1rem; margin-bottom: 2px; text-transform: capitalize; }
        .prof-info .role { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

        .menu-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin: 24px 24px 8px; }
        .nav-item { margin: 4px 16px; padding: 12px 16px; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: var(--transition); text-decoration: none; }
        .nav-item i { font-size: 18px; width: 24px; text-align: center; }
        .nav-item:hover { background-color: var(--bg-main); color: var(--text-main); }
        .logout-btn { margin-top: auto; margin-bottom: 20px; color: #dc2626; }
        .logout-btn:hover { background-color: #fee2e2; color: #dc2626; }

        /* ================= Main Content ================= */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; background-color: var(--bg-main); align-items: center; }
        
        .header-content { text-align: center; margin-bottom: 40px; }
        .header-content h1 { font-size: 28px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; }
        .badge-course { display: inline-block; background: #e0e7ff; color: var(--brand-color); padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; }

        .manual-card {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .icon-large {
            font-size: 4rem;
            color: var(--brand-color);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); font-size: 0.95rem; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-light);
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            transition: var(--transition);
            outline: none;
            text-align: center;
            letter-spacing: 2px;
        }
        .input-group input:focus { border-color: var(--brand-color); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-submit {
            width: 100%;
            background: var(--brand-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn-submit:hover { background: var(--brand-hover); transform: translateY(-2px); }

        /* حالة النتيجة */
        #resultAlert {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            display: none;
            align-items: center;
            gap: 10px;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .alert-success { background: var(--success-bg); color: var(--success-color); border: 1px solid #a7f3d0; }
        .alert-error { background: var(--error-bg); color: var(--error-color); border: 1px solid #fecaca; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* List of attendees */
        .recent-list {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        .recent-list h4 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; }
        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .student-row .time { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="courses.html" class="logo-area">
            <div class="icon-box"><i class="fa-solid fa-layer-group"></i></div>
            <span>Attendix</span>
        </a>
        
        <div class="prof-profile">
            <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
            <div class="prof-info">
                <div class="name" id="drNameDisplay">Professor</div>
                <div class="role">Faculty Member</div>
            </div>
        </div>
        
        <div class="menu-title">Faculty Portal</div>
        <a href="courses.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Back to Courses</a>
        
        <a href="#" id="logoutBtn" class="nav-item logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
    </aside>

    <main class="main-wrapper">
        <div class="header-content">
            <div class="badge-course" id="courseBadge">Loading Course...</div>
            <h1 style="margin-top: 15px;">Manual ID Attendance</h1>
        </div>

        <div class="manual-card">
            <i class="fa-solid fa-address-card icon-large"></i>
            
            <form id="manualForm">
                <div class="input-group">
                    <label>Student University ID</label>
                    <input type="text" id="studentIdInput" placeholder="Enter ID..." autocomplete="off" required>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-check-to-slot"></i> Mark Present
                </button>
            </form>

            <div id="resultAlert"></div>

            <div class="recent-list">
                <h4>Recently Added Today</h4>
                <div id="recentContainer">
                    </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // عرض اسم الدكتور
            const userName = localStorage.getItem("userName");
            if (userName) document.getElementById("drNameDisplay").innerText = userName;

            // جلب بيانات الكورس من الـ Session
            const contextStr = sessionStorage.getItem("courseContext");
            if (contextStr) {
                const context = JSON.parse(contextStr);
                document.getElementById("courseBadge").innerText = `${context.code} - ${context.course}`;
            }

            // برمجة زرار الخروج
            document.getElementById("logoutBtn").addEventListener("click", (e) => {
                e.preventDefault();
                if(confirm("Are you sure you want to sign out?")) {
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.replace("login.html");
                }
            });
        });

        const manualForm = document.getElementById('manualForm');
        const studentIdInput = document.getElementById('studentIdInput');
        const resultAlert = document.getElementById('resultAlert');
        const recentContainer = document.getElementById('recentContainer');

        manualForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = studentIdInput.value.trim();
            if(!id) return;

            // 1. جلب بيانات الطلاب من الداتا الوهمية (المحفوظة في اللوكال ستوريدج من الـ Config أو المضافة)
            let localStudents = JSON.parse(localStorage.getItem('mock_students')) || [];
            let initialStudents = [];
            if(window.API_CONFIG && window.API_CONFIG.MOCK_DATABASE) {
                initialStudents = window.API_CONFIG.MOCK_DATABASE.initialStudents || [];
            }
            
            const allStudents = [...localStudents, ...initialStudents];

            // 2. البحث عن الطالب بالـ ID
            const foundStudent = allStudents.find(std => std.id === id);

            resultAlert.style.display = "flex";

            if (foundStudent) {
                // نجاح
                resultAlert.className = "alert-success";
                resultAlert.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${foundStudent.name} marked as Present!`;
                
                // إضافة لللستة اللي تحت
                const timeNow = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const row = document.createElement('div');
                row.className = 'student-row';
                row.innerHTML = `<span><i class="fa-solid fa-user" style="color: var(--brand-color); margin-right:8px;"></i> ${foundStudent.name}</span> <span class="time">${timeNow}</span>`;
                
                recentContainer.prepend(row); // يحط الجديد فوق
                studentIdInput.value = ''; // يفضي الخانة
                studentIdInput.focus();

            } else {
                // فشل (طالب مش موجود)
                resultAlert.className = "alert-error";
                resultAlert.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Student ID not found in database!`;
                studentIdInput.select();
            }

            // إخفاء الرسالة بعد 3 ثواني
            setTimeout(() => {
                resultAlert.style.display = "none";
            }, 3000);
        });
    </script>
</body>
</html>
