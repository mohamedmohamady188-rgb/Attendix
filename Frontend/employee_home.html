<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Attendix</title>
    
    <script>
        (function() {
            const token = localStorage.getItem("userToken");
            const role = localStorage.getItem("userRole");

            if (!token) {
                window.location.replace('login.html');
                return;
            }

            if (role !== "admin" && role !== "employee") {
                alert("Access Denied: Admin and Employees Only!");
                window.location.replace('student_dashboard.html'); 
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --brand-color: #2563eb;
            --brand-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        /* Navbar */
        .admin-navbar {
            background: var(--surface);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-navbar .brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .brand-icon {
            background: var(--brand-color);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .logout-btn {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #f87171;
            transform: translateY(-2px);
        }

        /* Dashboard Container */
        .dashboard {
            max-width: 1200px;
            margin: auto;
            padding-top: 40px;
            padding-bottom: 60px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 { 
            color: var(--text-main); 
            font-weight: 800; 
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        
        .page-title p { 
            color: var(--text-muted); 
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* 💡 تنسيق الإحصائيات السريعة */
        .quick-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .stat-badge {
            background: var(--surface);
            border: 1px solid var(--border-light);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-sm);
        }
        .stat-badge i { font-size: 1.8rem; color: var(--brand-color); }
        .stat-info h3 { margin: 0; font-weight: 800; font-size: 1.5rem; color: var(--text-main); }
        .stat-info span { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        /* Grid Boxes */
        .box {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-top: 4px solid var(--brand-color); 
            border-radius: var(--radius);
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            text-decoration: none;
        }

        .box:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-card);
            border-color: rgba(37, 99, 235, 0.3);
        }

        .box h6 {
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            margin: 0;
            font-size: 1.1rem;
        }

        .box-icon {
            font-size: 3.5rem;
            color: var(--brand-color);
            margin-bottom: 20px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .box:hover .box-icon {
            transform: scale(1.15);
        }
    </style>
</head>
<body>

    <nav class="admin-navbar">
        <a href="index.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
            Attendix Admin
        </a>
        
        <a href="#" id="logoutBtn" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Sign Out
        </a>
    </nav>

    <div class="container dashboard">
        
        <div class="page-title">
            <h1>Control Panel</h1>
            <p>Select a module to manage university data and system settings.</p>
        </div>

        <div class="quick-stats">
            <div class="stat-badge">
                <i class="fa-solid fa-users"></i>
                <div class="stat-info">
                    <h3 id="totalStudentsStat">0</h3>
                    <span>Enrolled Students</span>
                </div>
            </div>
            <div class="stat-badge">
                <i class="fa-solid fa-server"></i>
                <div class="stat-info">
                    <h3 style="color: #059669;">Online</h3>
                    <span>System Status</span>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-users-gear box-icon"></i>
                    <h6>User Accounts</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-user-tie box-icon"></i>
                    <h6>Employee Management</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-envelope-open-text box-icon"></i>
                    <h6>Messages</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-database box-icon"></i>
                    <h6>Backup Data</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('reports.html')">
                    <i class="fa-solid fa-chart-line box-icon"></i>
                    <h6>Reports & Analytics</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('add_student.html')">
                    <i class="fa-solid fa-user-plus box-icon"></i>
                    <h6>Add New Student</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-paper-plane box-icon"></i>
                    <h6>Email Broadcasting</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-headset box-icon"></i>
                    <h6>Technical Support</h6>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="box" onclick="goPage('#')">
                    <i class="fa-solid fa-folder-open box-icon"></i>
                    <h6>Documents</h6>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // 💡 كود استخراج عدد الطلاب من الداتا المدمجة
        document.addEventListener("DOMContentLoaded", () => {
            let localStudents = JSON.parse(localStorage.getItem('mock_students')) || [];
            let initialStudents = [];
            if(window.API_CONFIG && window.API_CONFIG.MOCK_DATABASE) {
                initialStudents = window.API_CONFIG.MOCK_DATABASE.initialStudents || [];
            }
            
            // عرض إجمالي عدد الطلاب
            document.getElementById("totalStudentsStat").innerText = localStudents.length + initialStudents.length;
        });

        // دالة التوجيه الذكية
        function goPage(page){
            if(page !== '#') {
                window.location.href = page;
            } else {
                alert("⏳ This module is currently under development and will be available in the next release.");
            }
        }

        // برمجة زرار الخروج الآمن
        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            if(confirm("Are you sure you want to sign out?")) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.replace("login.html");
            }
        });
    </script>
</body>
</html>
