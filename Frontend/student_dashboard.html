<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Attendix</title>
    
    <script>
        (function() {
            const token = localStorage.getItem("userToken");
            const role = localStorage.getItem("userRole");

            // لو مفيش توكن، يرجع للوجين
            if (!token) {
                window.location.replace('login.html');
                return;
            }

            // تأمين الأدوار: الصفحة دي للطلاب بس
            // لو دكتور أو آدمن حاول يدخل هنا بالغلط، نرجعه لصفحته
            if (role === "doctor") {
                window.location.replace('courses.html');
            } else if (role === "admin" || role === "employee") {
                window.location.replace('employee_home.html');
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #2563eb;
            --brand-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --danger: #ef4444;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { display: flex; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* ================= Sidebar ================= */
        .sidebar { width: 280px; background-color: var(--surface); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; z-index: 10; box-shadow: var(--shadow-sm); }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border-light); }
        .global-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .global-brand .brand-icon { background: var(--brand-color); color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }
        .global-brand .brand-text { font-size: 22px; font-weight: 800; color: var(--text-main); letter-spacing: -0.02em; }
        
        .sidebar-nav { padding: 24px 0; flex: 1; display: flex; flex-direction: column; }
        .menu-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 24px 8px; }
        .nav-item { margin: 4px 16px; padding: 12px 16px; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: var(--transition); text-decoration: none; }
        .nav-item i { font-size: 18px; width: 24px; text-align: center; }
        .nav-item:hover { background-color: var(--bg-main); color: var(--text-main); }
        .nav-item.active { background-color: var(--brand-color); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        
        .logout-btn { margin-top: auto; color: var(--danger); font-weight: 600; cursor: pointer; }
        .logout-btn:hover { background-color: #fee2e2; color: #b91c1c; }

        /* ================= Main Content ================= */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }

        .profile-header {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 2rem;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--brand-color), #60a5fa);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .profile-details h1 { font-size: 2rem; margin-bottom: 5px; color: var(--text-main); text-transform: capitalize; font-weight: 800; letter-spacing: -0.02em;}
        .profile-details p { color: var(--text-muted); font-size: 1rem; font-weight: 500; margin-bottom: 8px;}
        .profile-details .badge { background: var(--bg-main); color: var(--brand-color); padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border-light); display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem;}

        .page-header h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .subject-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .subject-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); border-color: rgba(37, 99, 235, 0.3); }

        .subject-header { border-bottom: 1px solid var(--border-light); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .subject-title { font-size: 1.15rem; font-weight: 700; color: var(--text-main); }
        
        .stats-row { display: flex; justify-content: space-between; text-align: center; margin-bottom: 1.5rem; }
        .stat-box h4 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 2px; font-weight: 800; }
        .stat-box span { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }

        .progress-wrapper { width: 100%; }
        .progress-track { height: 8px; background: var(--border-light); border-radius: 10px; overflow: hidden; margin-bottom: 12px;}
        .progress-fill { height: 100%; border-radius: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
        
        #loadingState { text-align: center; padding: 5rem; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        
        .btn-primary { background-color: var(--brand-color); color: white; border: none; padding: 0.85rem 1.5rem; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: var(--transition); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .btn-primary:hover { background-color: var(--brand-hover); transform: translateY(-2px); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="global-brand">
                <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
                <span class="brand-text">Attendix</span>
            </a>
        </div>
        
        <div class="sidebar-nav">
            <div class="menu-title">Student Portal</div>
            <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-calendar-days"></i> Schedule</a>
            <a href="#" class="nav-item"><i class="fa-regular fa-bell"></i> Notifications</a>
            
            <a href="#" id="logoutBtn" class="nav-item logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div id="loadingState">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 3rem; margin-bottom: 20px; color: var(--brand-color);"></i>
            <p style="font-size: 1.1rem; font-weight: 500;">Fetching your academic records...</p>
        </div>

        <div id="dashboardContent" style="display: none;">
            <div class="profile-header">
                <div class="profile-avatar" id="avatarInitial">?</div>
                <div class="profile-details">
                    <h1 id="studentName">Loading Name...</h1>
                    <p id="studentIdEmail">ID: -- | Email: --</p>
                    <div class="badge" id="studentDeptYear">
                        <i class="fa-solid fa-graduation-cap"></i> 
                        <span id="deptText">Loading...</span>
                    </div>
                </div>
            </div>

            <div class="page-header" style="margin-bottom: 1.5rem;">
                <h2>My Attendance Overview</h2>
            </div>

            <div class="courses-grid" id="subjectsContainer">
                </div>
        </div>
    </main>

    <script src="config.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // برمجة زرار الخروج
            document.getElementById("logoutBtn").addEventListener("click", (e) => {
                e.preventDefault();
                if(confirm("Are you sure you want to sign out?")) {
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.replace("login.html");
                }
            });

            // 1. استرجاع البيانات المحفوظة من الـ Login
            const userId = localStorage.getItem("userId");
            const userEmail = localStorage.getItem("userEmail");
            
            // التأكد من وجود ID المستخدم لمنع الدخول غير المصرح به
            if (!userId || userId === "undefined" || userId === "null") {
                console.error("No valid userId found. Redirecting to login...");
                window.location.replace("login.html");
                return;
            }

            try {
                // 2. قراءة رابط الـ API بتاع الدوت نت من الـ Config
                const DOTNET_API = window.API_CONFIG.DOTNET_API_URL;
                
                // طلب البيانات من سيرفر الـ .NET باستخدام الـ ID
                const response = await fetch(`${DOTNET_API}/Auth/student-info/${userId}`);
                
                if (!response.ok) {
                    throw new Error("Student data not found on server");
                }

                const data = await response.json();

                // 3. ملء بيانات الهيدر (الملف الشخصي)
                document.getElementById("studentName").innerText = data.name;
                document.getElementById("avatarInitial").innerText = data.name.charAt(0).toUpperCase();
                document.getElementById("studentIdEmail").innerText = `ID: ${data.id} | Email: ${userEmail || 'N/A'}`;
                document.getElementById("deptText").innerText = `${data.department} (Year ${data.academicYear})`;

                // 4. بناء كروت المواد الدراسية
                const container = document.getElementById("subjectsContainer");
                container.innerHTML = ""; 

                if (!data.attendance || data.attendance.length === 0) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem; background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border-light); color: var(--text-muted); font-size: 1.1rem; font-weight: 500;">No attendance records found yet.</div>`;
                } else {
                    data.attendance.forEach(sub => {
                        // حساب الألوان بناءً على نسبة الحضور
                        let colorHex = sub.rate >= 75 ? '#10b981' : (sub.rate >= 60 ? '#f59e0b' : '#ef4444');
                        let statusText = sub.rate >= 75 ? 'Status: OK' : (sub.rate >= 60 ? 'Status: Warning' : 'Status: Blocked');
                        let statusBg = sub.rate >= 75 ? '#ecfdf5' : (sub.rate >= 60 ? '#fffbeb' : '#fef2f2');
                        let statusBorder = sub.rate >= 75 ? '#a7f3d0' : (sub.rate >= 60 ? '#fde68a' : '#fecaca');

                        const card = `
                            <div class="subject-card">
                                <div class="subject-header">
                                    <div class="subject-title">${sub.subject}</div>
                                </div>
                                
                                <div class="stats-row">
                                    <div class="stat-box">
                                        <h4>${sub.attended}</h4>
                                        <span>Attended</span>
                                    </div>
                                    <div class="stat-box">
                                        <h4>${sub.absent}</h4>
                                        <span>Absent</span>
                                    </div>
                                </div>

                                <div class="progress-section">
                                    <div class="progress-wrapper">
                                        <div class="progress-track">
                                            <div class="progress-fill" style="width: ${sub.rate}%; background-color: ${colorHex}; box-shadow: 0 0 10px ${colorHex}80;"></div>
                                        </div>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                                        <span style="font-weight: 800; font-size: 1.1rem; color: ${colorHex};">${sub.rate}%</span>
                                        <span class="status-badge" style="background-color: ${statusBg}; color: ${colorHex}; border-color: ${statusBorder};">
                                            <i class="fa-solid ${sub.rate >= 75 ? 'fa-check' : 'fa-triangle-exclamation'}"></i> ${statusText}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                }

                // 5. تبديل حالة العرض من Loading إلى المحتوى
                document.getElementById("loadingState").style.display = "none";
                document.getElementById("dashboardContent").style.display = "block";

            } catch (error) {
                console.error("Dashboard Fetch Error:", error);
                document.getElementById("loadingState").innerHTML = `
                    <i class="fa-solid fa-circle-xmark" style="font-size: 4rem; color: var(--danger); margin-bottom: 20px;"></i>
                    <p style="font-weight:700; font-size: 1.2rem; color:var(--text-main); margin-bottom: 5px;">Connection Failed</p>
                    <p style="font-size:0.95rem; color: var(--text-muted); margin-bottom: 25px;">Unable to fetch data from the server. Please check your connection.</p>
                    <button onclick="location.reload()" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-rotate-right"></i> Try Again
                    </button>
                `;
            }
        });
    </script>
</body>
</html>
